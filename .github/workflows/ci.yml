name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test -- --run

      - name: Build
        run: NODE_ENV=production npx tsc && npx vite build

      - name: Check no unguarded elements
        run: |
          node scripts/add-element-guard.mjs
          git diff --exit-code src/
